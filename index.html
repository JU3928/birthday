<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎂 生日快乐！</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 30%, #fecfef 50%, #ffdde1 70%, #ff9a9e 100%);
            background-size: 400% 400%;
            animation: gradientShift 12s ease infinite;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Georgia', 'Times New Roman', serif;
            overflow-x: hidden;
            cursor: default;
        }

        @keyframes gradientShift {
            0%   { background-position: 0% 50%; }
            50%  { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Floating hearts and stars */
        .floating {
            position: fixed;
            pointer-events: none;
            animation: floatUp linear forwards;
            z-index: 0;
            font-size: 24px;
        }

        @keyframes floatUp {
            0% {
                opacity: 1;
                transform: translateY(0) rotate(0deg) scale(1);
            }
            50% {
                opacity: 0.8;
                transform: translateY(-50vh) rotate(180deg) scale(1.3);
            }
            100% {
                opacity: 0;
                transform: translateY(-100vh) rotate(360deg) scale(0.5);
            }
        }

        /* Balloon styles */
        .balloon {
            position: fixed;
            bottom: -200px;
            width: 60px;
            height: 80px;
            border-radius: 50% 50% 50% 50% / 40% 40% 60% 60%;
            animation: balloonFloat linear forwards;
            pointer-events: none;
            z-index: 0;
        }

        .balloon::before {
            content: '';
            position: absolute;
            bottom: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 2px;
            height: 30px;
            background: rgba(255,255,255,0.5);
        }

        .balloon::after {
            content: '';
            position: absolute;
            bottom: -25px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 8px solid transparent;
            border-right: 8px solid transparent;
            border-top: 16px solid currentColor;
            opacity: 0.3;
        }

        @keyframes balloonFloat {
            0% {
                transform: translateY(0) translateX(0) rotate(0deg);
                opacity: 0.9;
            }
            100% {
                transform: translateY(-110vh) translateX(80px) rotate(20deg);
                opacity: 0;
            }
        }

        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 50px;
        }

        .card {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 50px 40px;
            box-shadow: 0 20px 60px rgba(255, 105, 135, 0.3),
                        0 0 0 1px rgba(255, 255, 255, 0.5),
                        inset 0 0 40px rgba(255, 255, 255, 0.3);
            max-width: 520px;
            animation: cardAppear 1.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes cardAppear {
            0% {
                opacity: 0;
                transform: scale(0.8) translateY(30px);
            }
            100% {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .cake {
            font-size: 80px;
            animation: cakeBounce 2s ease-in-out infinite;
            display: inline-block;
            cursor: pointer;
            transition: transform 0.2s;
            filter: drop-shadow(0 4px 12px rgba(255, 150, 150, 0.4));
        }

        .cake:active {
            transform: scale(0.9);
        }

        @keyframes cakeBounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }

        .title {
            font-size: 42px;
            color: #d6336c;
            margin: 20px 0 10px;
            font-weight: bold;
            text-shadow: 0 2px 4px rgba(214, 51, 108, 0.2);
            letter-spacing: 2px;
        }

        .subtitle {
            font-size: 20px;
            color: #e64980;
            margin-bottom: 30px;
            font-style: italic;
            opacity: 0.9;
        }

        .message {
            font-size: 17px;
            color: #6b4e5e;
            line-height: 2;
            margin-bottom: 25px;
        }

        .age-badge {
            display: inline-block;
            background: linear-gradient(135deg, #ff6b9d, #c44dff);
            color: white;
            font-size: 28px;
            font-weight: bold;
            padding: 8px 28px;
            border-radius: 50px;
            margin-bottom: 20px;
            box-shadow: 0 6px 20px rgba(196, 77, 255, 0.35);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 6px 20px rgba(196, 77, 255, 0.35); }
            50% { box-shadow: 0 6px 35px rgba(196, 77, 255, 0.6); }
        }

        .btn {
            display: inline-block;
            background: linear-gradient(135deg, #ff6b9d, #ee5a6f);
            color: white;
            border: none;
            padding: 14px 36px;
            font-size: 18px;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 6px 24px rgba(238, 90, 111, 0.4);
            text-decoration: none;
            letter-spacing: 1px;
            margin: 6px;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(238, 90, 111, 0.5);
            background: linear-gradient(135deg, #ff7dae, #f06b7e);
        }

        .btn:active {
            transform: translateY(1px);
            box-shadow: 0 4px 12px rgba(238, 90, 111, 0.4);
        }

        .btn.secondary {
            background: linear-gradient(135deg, #c44dff, #9b59b6);
            box-shadow: 0 6px 24px rgba(155, 89, 182, 0.4);
        }

        .btn.secondary:hover {
            background: linear-gradient(135deg, #d05eff, #a96dc5);
            box-shadow: 0 10px 30px rgba(155, 89, 182, 0.5);
        }

        /* Confetti */
        .confetti-piece {
            position: fixed;
            pointer-events: none;
            z-index: 100;
            animation: confettiFall linear forwards;
        }

        @keyframes confettiFall {
            0% {
                transform: translateY(-100vh) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(100vh) rotate(720deg);
                opacity: 0;
            }
        }

        .hidden-gift {
            display: none;
            margin-top: 25px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 16px;
            animation: fadeInUp 0.6s ease;
        }

        .hidden-gift.show {
            display: block;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .gift-text {
            font-size: 16px;
            color: #d6336c;
            line-height: 1.8;
        }

        /* Firework dots */
        .spark {
            position: fixed;
            pointer-events: none;
            z-index: 99;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            animation: sparkBurst 1s ease-out forwards;
        }

        @keyframes sparkBurst {
            0% {
                transform: translate(0, 0) scale(1);
                opacity: 1;
            }
            100% {
                transform: translate(var(--dx), var(--dy)) scale(0);
                opacity: 0;
            }
        }

        .date-highlight {
            color: #d6336c;
            font-weight: bold;
        }

        .footer {
            margin-top: 30px;
            font-size: 13px;
            color: rgba(107, 78, 94, 0.6);
        }

        @media (max-width: 600px) {
            .card {
                padding: 30px 24px;
                margin: 20px;
            }
            .title {
                font-size: 30px;
            }
        }
    </style>
</head>
<body>
    <!-- Container for all floating elements -->
    <div id="floating-container"></div>
    <div id="confetti-container"></div>

    <div class="container">
        <div class="card">
            <div class="cake" id="cake" title="点我！">🎂</div>
            <div class="age-badge">✨ 23岁 ✨</div>
            <h1 class="title">生日快乐！</h1>
            <p class="subtitle">Happy Birthday 🎀</p>
            <p class="message">
                亲爱的朋友，<br>
                在这特别的日子里——<strong class="date-highlight">7月4日</strong><br>
                愿你的每一天都充满阳光与微笑 🌸<br>
                愿所有的美好都如期而至 💕<br>
                23岁，正是最美好的年华！<br>
                愿你眼里有光，心中有爱 ✨
            </p>
            <button class="btn" id="surpriseBtn">🎁 点我有惊喜</button>
            <button class="btn secondary" id="fireworkBtn">🎆 放烟花</button>

            <div class="hidden-gift" id="hiddenGift">
                <p class="gift-text">
                    🌟 <strong>给你的悄悄话：</strong><br><br>
                    在这个属于你的日子里，<br>
                    愿幸福把你围绕，<br>
                    愿快乐和你拥抱，<br>
                    愿健康陪你到老，<br>
                    愿你的未来，充满无限精彩！<br><br>
                    🎈 希望你永远开心、永远美丽、永远被这个世界温柔以待 ❤️<br><br>
                    <span style="font-size: 24px;">💝</span>
                </p>
            </div>
        </div>
        <p class="footer">💌 Made with love · 2025.07.04</p>
    </div>

    <script>
        // Emojis for floating animation
        const floatingEmojis = ['💕', '💖', '💗', '💝', '🌟', '✨', '🌸', '🌷', '🦋', '🎀', '💎', '🍰', '🧁', '💫', '🕊️'];
        const balloonColors = ['#ff6b9d', '#ff9a9e', '#c44dff', '#ffdde1', '#f093fb', '#fbc2eb', '#a18cd1', '#ffecd2', '#fcb69f', '#ff8177'];

        // Create floating hearts/stars
        function createFloating() {
            const container = document.getElementById('floating-container');
            setInterval(() => {
                const el = document.createElement('span');
                el.className = 'floating';
                el.textContent = floatingEmojis[Math.floor(Math.random() * floatingEmojis.length)];
                el.style.left = Math.random() * 100 + '%';
                el.style.top = (60 + Math.random() * 40) + '%';
                el.style.fontSize = (16 + Math.random() * 28) + 'px';
                el.style.animationDuration = (3 + Math.random() * 5) + 's';
                container.appendChild(el);

                // Remove after animation
                setTimeout(() => el.remove(), 8000);
            }, 600);
        }

        // Create balloons
        function createBalloons() {
            const container = document.getElementById('floating-container');
            setInterval(() => {
                const balloon = document.createElement('div');
                balloon.className = 'balloon';
                const color = balloonColors[Math.floor(Math.random() * balloonColors.length)];
                balloon.style.background = `radial-gradient(circle at 30% 30%, ${color}, ${color}dd)`;
                balloon.style.color = color;
                balloon.style.left = (5 + Math.random() * 90) + '%';
                balloon.style.animationDuration = (8 + Math.random() * 8) + 's';
                balloon.style.width = (40 + Math.random() * 50) + 'px';
                balloon.style.height = (50 + Math.random() * 60) + 'px';
                container.appendChild(balloon);

                setTimeout(() => balloon.remove(), 16000);
            }, 1200);
        }

        // Confetti burst
        function launchConfetti(count = 80) {
            const container = document.getElementById('confetti-container');
            const colors = ['#ff6b9d', '#ff9a9e', '#c44dff', '#ffd700', '#ff69b4', '#87ceeb', '#ffb6c1', '#ffa07a', '#98fb98', '#dda0dd'];

            for (let i = 0; i < count; i++) {
                setTimeout(() => {
                    const piece = document.createElement('div');
                    piece.className = 'confetti-piece';
                    piece.style.left = Math.random() * 100 + '%';
                    piece.style.top = -(Math.random() * 20) + '%';
                    piece.style.width = (6 + Math.random() * 10) + 'px';
                    piece.style.height = (6 + Math.random() * 14) + 'px';
                    piece.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                    piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
                    piece.style.animationDuration = (2 + Math.random() * 3) + 's';
                    piece.style.animationDelay = Math.random() * 0.5 + 's';
                    container.appendChild(piece);

                    setTimeout(() => piece.remove(), 5000);
                }, i * 15);
            }
        }

        // Firework sparkles at a point
        function fireworkAt(x, y) {
            const container = document.getElementById('confetti-container');
            const colors = ['#ff6b9d', '#ff9a9e', '#c44dff', '#ffd700', '#ff69b4', '#87ceeb', '#ffb6c1', '#ffa07a', '#98fb98', '#dda0dd', '#fff'];
            const sparkCount = 30;

            for (let i = 0; i < sparkCount; i++) {
                const spark = document.createElement('div');
                spark.className = 'spark';
                spark.style.left = x + 'px';
                spark.style.top = y + 'px';
                spark.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                spark.style.width = (3 + Math.random() * 7) + 'px';
                spark.style.height = spark.style.width;
                const angle = (Math.PI * 2 * i) / sparkCount;
                const distance = 60 + Math.random() * 100;
                spark.style.setProperty('--dx', Math.cos(angle) * distance + 'px');
                spark.style.setProperty('--dy', Math.sin(angle) * distance + 'px');
                container.appendChild(spark);

                setTimeout(() => spark.remove(), 1200);
            }
        }

        // Cake click handler
        document.getElementById('cake').addEventListener('click', function(e) {
            launchConfetti(60);
            fireworkAt(e.clientX, e.clientY);
            const cake = this;
            cake.style.transform = 'scale(1.3)';
            setTimeout(() => cake.style.transform = '', 200);
        });

        // Surprise button
        document.getElementById('surpriseBtn').addEventListener('click', function() {
            const gift = document.getElementById('hiddenGift');
            gift.classList.toggle('show');
            if (gift.classList.contains('show')) {
                launchConfetti(100);
                this.textContent = '💝 收起来';
                gift.scrollIntoView({ behavior: 'smooth', block: 'center' });
            } else {
                this.textContent = '🎁 点我有惊喜';
            }
        });

        // Firework button
        document.getElementById('fireworkBtn').addEventListener('click', function() {
            for (let i = 0; i < 5; i++) {
                setTimeout(() => {
                    const x = 100 + Math.random() * (window.innerWidth - 200);
                    const y = 100 + Math.random() * (window.innerHeight - 300);
                    fireworkAt(x, y);
                }, i * 200);
            }
            launchConfetti(120);
        });

        // Click anywhere for small sparkle
        document.addEventListener('click', function(e) {
            if (e.target.tagName === 'BUTTON' || e.target.id === 'cake') return;
            const spark = document.createElement('div');
            spark.className = 'spark';
            spark.style.left = e.clientX + 'px';
            spark.style.top = e.clientY + 'px';
            spark.style.backgroundColor = '#ff9a9e';
            spark.style.setProperty('--dx', (Math.random() - 0.5) * 40 + 'px');
            spark.style.setProperty('--dy', (Math.random() - 0.5) * 40 + 'px');
            spark.style.width = '8px';
            spark.style.height = '8px';
            document.getElementById('confetti-container').appendChild(spark);
            setTimeout(() => spark.remove(), 1200);
        });

        // Press any key for confetti
        document.addEventListener('keydown', function(e) {
            if (e.key === ' ' || e.key === 'Enter') {
                e.preventDefault();
                launchConfetti(50);
            }
        });

        // Initialize
        createFloating();
        createBalloons();

        // Initial welcome confetti
        setTimeout(() => launchConfetti(50), 1500);
    </script>
</body>
</html>
